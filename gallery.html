<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gallery of stained glass pieces by Michelle — Hilton Head Island." />
  <title>Gallery | Stained Glass by Michelle</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <script src="./assets/js/main.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav class="floating-nav" aria-label="Primary navigation">
    <a class="floating-link" href="./index.html">Home</a>
    <a class="floating-link is-active" href="./gallery.html">Gallery</a>
    <a class="floating-link" href="./about.html">About</a>
    <a class="floating-link" href="./contact.html">Contact</a>
  </nav>
<main id="main" class="site-main" tabindex="-1">
    <section class="section" aria-labelledby="gallery-title">
      <div class="container">
        <h1 id="gallery-title" class="section-title">Gallery</h1>
        <p class="section-subtitle">Click a piece to view a larger version.</p>

        <div id="gallery-grid" class="gallery-grid" role="list">
          <!-- Rendered by JS from /data/pieces.json -->
        </div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/wave.jpg" data-title="Wave" data-alt="Stained glass piece: Wave">
        <img src="./assets/images/gallery/thumbs/wave.jpg" alt="Stained glass piece: Wave" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Wave</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/wave-deep-blue.jpg" data-title="Wave (Deep Blue)" data-alt="Stained glass piece: Wave (Deep Blue)">
        <img src="./assets/images/gallery/thumbs/wave-deep-blue.jpg" alt="Stained glass piece: Wave (Deep Blue)" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Wave (Deep Blue)</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/washington-dc.jpg" data-title="Washington DC" data-alt="Stained glass piece: Washington DC">
        <img src="./assets/images/gallery/thumbs/washington-dc.jpg" alt="Stained glass piece: Washington DC" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Washington DC</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/fleur-de-lis.jpg" data-title="Fleur-de-lis" data-alt="Stained glass piece: Fleur-de-lis">
        <img src="./assets/images/gallery/thumbs/fleur-de-lis.jpg" alt="Stained glass piece: Fleur-de-lis" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Fleur-de-lis</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/grinch.jpg" data-title="Grinch" data-alt="Stained glass piece: Grinch">
        <img src="./assets/images/gallery/thumbs/grinch.jpg" alt="Stained glass piece: Grinch" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Grinch</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/harbour-town.jpg" data-title="Harbour Town" data-alt="Stained glass piece: Harbour Town">
        <img src="./assets/images/gallery/thumbs/harbour-town.jpg" alt="Stained glass piece: Harbour Town" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Harbour Town</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/astros.jpg" data-title="Astros" data-alt="Stained glass piece: Astros">
        <img src="./assets/images/gallery/thumbs/astros.jpg" alt="Stained glass piece: Astros" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Astros</div>
    </article>

    <article class="gallery-item" role="listitem">
      <button class="gallery-btn" type="button" data-lightbox data-large="./assets/images/gallery/large/cross.jpg" data-title="Cross" data-alt="Stained glass piece: Cross">
        <img src="./assets/images/gallery/thumbs/cross.jpg" alt="Stained glass piece: Cross" loading="lazy" decoding="async" />
      </button>
      <div class="gallery-caption">Cross</div>
    </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Michelle · Hilton Head Island, SC</p>
    </div>
  </footer>

  <div class="modal" data-modal aria-hidden="true" role="dialog" aria-modal="true" aria-label="Artwork preview">
    <div class="modal-dialog">
      <div class="modal-head">
        <h3 class="modal-title" data-modal-title>Artwork</h3>
        <button class="modal-close" type="button" data-modal-close aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <img data-modal-img src="" alt="" />
      </div>
    </div>
  </div>
</body>
</html>
